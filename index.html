<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caisse Cafet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="root">
    <div id="modal-caisse" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center;">
  <div style="background:#161926; border-radius:14px; padding:1.5rem; width:260px; text-align:center;">
    <div style="font-size:13px; color:#6b7194; margin-bottom:12px;" id="modal-titre">Montant de départ</div>
    <input id="modal-input" type="number" inputmode="decimal" min="0" step="0.01"
      style="width:100%; font-size:24px; text-align:center; background:#1c2035; border:1px solid rgba(255,255,255,0.1); color:#eef0f6; border-radius:8px; padding:10px; margin-bottom:12px;">
    <button onclick="validerModal()" style="width:100%; padding:10px; background:#2ecc71; color:#000; border:none; border-radius:8px; font-size:14px; cursor:pointer;">Confirmer</button>
  </div>
</div>
    <header class="header">
      <div>
        <div class="label">Total en cours</div>
        <div class="total-value" id="total-display">0,00 €</div>
        <div class="progress-wrap">
          <div class="progress-bar" id="prog-bar"></div>
        </div>
        <div class="progress-label" id="prog-label">Objectif : 0,00 € / 50,00 €</div>
      </div>
      <div class="header-right">
        <div class="label">Ventes</div>
        <div class="nb-ventes" id="nb-ventes">0</div>
      </div>
    </header>

    <div class="grid" id="buttons"></div>

    <div class="actions">
      <button class="btn-undo" id="btn-undo" onclick="annuler()">↩ Annuler</button>
      <button class="btn-caisse" onclick="setCaisseInitiale()">💰 Début</button>
      <button class="btn-caisse" onclick="setCaisseReelle()">🏁 Fin</button>
      <button class="btn-export" onclick="exporter()">↓ Export</button>
      <button class="btn-reset" onclick="reset()">✕ Reset</button>
    </div>

    <div class="journal-box">
      <div class="section-title">Dernières ventes</div>
      <div id="journal-list"><div class="vide">Aucune vente pour l'instant</div></div>
    </div>

    <div class="ecart-box" id="ecart-box" style="display:none">
      <div class="section-title">Bilan de caisse</div>
      <div id="ecart-contenu"></div>
    </div>

    <div class="stats-grid" id="stats"></div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="caisse.js"></script>
</body>
</html>
